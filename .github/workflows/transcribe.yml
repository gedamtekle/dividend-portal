name: Transcribe Bunny videos

on:
  schedule:
    - cron: "17 * * * *"   # every hour at :17 past
  workflow_dispatch: {}     # lets you run it on demand from the Actions tab

concurrency:
  group: transcribe
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests imageio-ffmpeg
      - name: Run transcription worker
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: python transcribe_worker.py
