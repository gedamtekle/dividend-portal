name: Transcribe Bunny videos

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [bunny-video]

concurrency:
  group: transcribe
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg + deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install requests imageio-ffmpeg
      - name: Run transcription worker
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: python transcribe_worker.py
