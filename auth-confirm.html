<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="light">
<title>Dividend Shift</title>
<link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png">
<style>
  :root { --navy:#0E1A2B; --gold:#F2B33D; --ink:#14161D; --mut:#6B7280; --line:#E7E7EC; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#F5F6F8; color:var(--ink);
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:34px 28px;
          max-width:420px; width:calc(100% - 32px); text-align:center;
          box-shadow:0 12px 40px rgba(14,26,43,.10); }
  img.logo { width:64px; height:64px; border-radius:16px; }
  h1 { font-size:21px; margin:18px 0 8px; color:var(--navy); }
  p { margin:0; color:var(--mut); font-size:14.5px; line-height:1.55; }
  .spin { width:26px; height:26px; margin:20px auto 0; border:3px solid var(--line);
          border-top-color:var(--gold); border-radius:50%; animation:sp .9s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  a.cta { display:inline-block; margin-top:20px; background:var(--navy); color:#fff; text-decoration:none;
          border-radius:12px; padding:12px 20px; font-weight:700; font-size:14px; }
  [hidden] { display:none !important; }
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/icons/icon-192.png" alt="Dividend Shift">
    <h1 id="h">Confirming your link&hellip;</h1>
    <p id="p">One moment while we verify it.</p>
    <div class="spin" id="spin"></div>
    <a class="cta" id="cta" href="/" hidden>Go to sign in</a>
  </main>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

  const SUPABASE_URL = 'https://dehttbxrkeqhsfkfpfwt.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaHR0Ynhya2VxaHNma2ZwZnd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjk4MjcsImV4cCI6MjA5NzY0NTgyN30.sZdkRz0QmLgbsTC_ZjdVd01bxjFH2TaoVgT_yVpoV40';

  const h = document.getElementById('h');
  const p = document.getElementById('p');
  const spin = document.getElementById('spin');
  const cta = document.getElementById('cta');

  function fail(msg) {
    h.textContent = 'This link didn’t work';
    p.textContent = msg || 'It may have expired or already been used. Ask your team to send a new one.';
    spin.hidden = true;
    cta.hidden = false;
  }

  (async function () {
    try {
      const qs = new URLSearchParams(location.search);
      const token_hash = qs.get('token_hash');
      const type = qs.get('type') || 'invite';
      const next = qs.get('next') || '/';

      if (!token_hash) { fail('The link is missing its verification code.'); return; }

      const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
        auth: {
          storageKey: 'sb-dehttbxrkeqhsfkfpfwt-auth-token',
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: false
        }
      });

      const { error } = await sb.auth.verifyOtp({ token_hash, type });
      if (error) { fail(error.message); return; }

      h.textContent = 'You’re all set';
      p.textContent = 'Taking you to your portal…';
      try { history.replaceState({}, '', '/auth/confirm'); } catch (_e) {}
      location.replace(next.startsWith('/') ? next : '/');
    } catch (e) {
      fail('We couldn’t reach the server. Please try again in a moment.');
    }
  })();
</script>
</body>
</html>
